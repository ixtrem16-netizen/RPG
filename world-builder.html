<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title data-i18n="pages.world-builder.title">World Builder — TGE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#070503; }
canvas { display:block; }

/* ── Écran de chargement ─────────────────────────────────────── */
#loading {
    position:fixed; inset:0; z-index:9999;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:#070503;
    font-family:'Georgia',serif; color:#c8b89a;
    transition:opacity 0.5s;
}
#loading.hidden { opacity:0; pointer-events:none; }
.load-title {
    font-size:9px; letter-spacing:6px; text-transform:uppercase;
    color:rgba(200,184,154,0.4); margin-bottom:14px;
}
.load-name {
    font-size:22px; letter-spacing:8px; text-transform:uppercase; color:#d0c0a0;
    margin-bottom:32px;
}
.load-bar-wrap {
    width:220px; height:2px; background:rgba(200,184,154,0.10); position:relative;
}
.load-bar {
    height:100%; width:0%; background:rgba(212,168,75,0.55); transition:width 0.3s;
}
.load-hint {
    margin-top:28px; font-size:9px; letter-spacing:3px; text-transform:uppercase;
    color:rgba(200,184,154,0.22);
}

/* ── Hint B ──────────────────────────────────────────────────── */
#hint-b {
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    z-index:500;
    font-family:'Georgia',serif; font-size:9px; letter-spacing:3px;
    text-transform:uppercase; color:rgba(200,184,154,0.30);
    pointer-events:none;
    opacity:0; transition:opacity 0.4s;
}
#hint-b.show { opacity:1; }

/* ── Statut personnage ────────────────────────────────────────── */
#char-status {
    position:fixed; bottom:14px; left:14px; z-index:500;
    font-family:'Georgia',serif; font-size:8px; letter-spacing:2px;
    text-transform:uppercase; color:rgba(200,184,154,0.22);
    pointer-events:none; line-height:1.8;
}
</style>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="loading">
    <div class="load-title" data-i18n="pages.world-builder.loading.brand">Quaternius Studio</div>
    <div class="load-name" data-i18n="pages.world-builder.loading.name">World Builder</div>
    <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
    <div class="load-hint" data-i18n="pages.world-builder.loading.initializing">Initializing...</div>
</div>

<div id="hint-b" data-i18n="pages.world-builder.hint-toggle">[ B ] - Toggle build mode</div>
<div id="char-status"></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';
import { BuildMode }     from './src/build_mode.js';
import { resolveCharConfig } from './src/char-config.js';
import { UAL_PATHS, CharacterRenderer, findIdleClip } from './src/char-loader.js';
import { initI18n, onLocaleChange, t, translateDOM } from './src/i18n.js';

// ── Scène ────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0f14);
scene.fog = new THREE.FogExp2(0x0d0f14, 0.012);

// ── Caméra ───────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 8, 18);
camera.lookAt(0, 0, 0);

// ── Renderer ─────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ── Lumières ─────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xc0c8d8, 0.55));

const sun = new THREE.DirectionalLight(0xfff4e0, 2.2);
sun.position.set(40, 80, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far  = 300;
sun.shadow.camera.left   = -80;
sun.shadow.camera.right  =  80;
sun.shadow.camera.top    =  80;
sun.shadow.camera.bottom = -80;
sun.shadow.bias = -0.0004;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x8090b8, 0.5);
fill.position.set(-30, 20, -20);
scene.add(fill);

// ── Sol de référence ─────────────────────────────────────────────
// Sol réel (récepteur d'ombres)
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x181410, roughness: 0.95, metalness: 0.0,
});
const ground = new THREE.Mesh(new THREE.PlaneGeometry(400, 400, 1, 1), groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grille de référence
const grid = new THREE.GridHelper(200, 200, 0x2a2520, 0x1a1512);
grid.position.y = 0.01;
scene.add(grid);

// Axes de référence (rouge=X, vert=Y, bleu=Z) — discrets
const axesHelper = new THREE.AxesHelper(5);
axesHelper.position.y = 0.02;
scene.add(axesHelper);

// ── Stub caméra gameplay ──────────────────────────────────────────
// BuildMode appelle camCtrl.setEditMode(bool) lors du toggle B.
// Ici il n'y a pas de caméra gameplay, donc c'est un no-op.
const camCtrl = {
    setEditMode(active) {
        const hint = document.getElementById('hint-b');
        if (!active) {
            // L'utilisateur vient de sortir du mode édition via B.
            // Montrer le hint pour lui rappeler comment y revenir.
            hint.classList.add('show');
        } else {
            hint.classList.remove('show');
        }
    }
};

// ── BuildMode ────────────────────────────────────────────────────
const buildMode = new BuildMode(scene, camera, renderer.domElement, camCtrl);

// ── Clavier (WASD FreeCam) ───────────────────────────────────────
const keys = new Set();
window.addEventListener('keydown', e => keys.add(e.code));
window.addEventListener('keyup',   e => keys.delete(e.code));

// ── Personnage joueur (CharacterRenderer — dual-skeleton) ────────
const _gLoader = new GLTFLoader();
const _gCache  = {};
function _loadGLTF(url) {
    if (_gCache[url]) return Promise.resolve(_gCache[url]);
    return new Promise((res, rej) =>
        _gLoader.load(url, g => { _gCache[url] = g; res(g); }, undefined, rej));
}

const charRenderer = new CharacterRenderer(scene, SkeletonUtils);
const charStatus   = document.getElementById('char-status');

function renderStaticText() {
    translateDOM();
    document.title = t('pages.world-builder.title');
}

async function loadPlayer() {
    const cfg = resolveCharConfig();
    if (!cfg) return;
    charStatus.textContent = t('pages.world-builder.status.loading-character');
    try {
        await charRenderer.load(cfg, _loadGLTF);
        // Charger la bibliothèque d'animations et jouer idle
        const results = await Promise.allSettled(UAL_PATHS.map(p => _loadGLTF(p)));
        const clipMap = new Map();
        for (const r of results) {
            if (r.status === 'fulfilled')
                for (const c of r.value.animations) clipMap.set(c.name, c);
        }
        const clips = [...clipMap.values()];
        const idle = findIdleClip(clips);
        if (idle) charRenderer.play(idle);
        charStatus.textContent = t('pages.world-builder.status.player-ready', {
            name: cfg.name || t('pages.world-builder.status.player'),
        });
    } catch(e) {
        charStatus.textContent = t('pages.world-builder.status.error');
        console.warn('[WorldBuilder] Chargement personnage échoué:', e);
    }
}

initI18n();
renderStaticText();
onLocaleChange(renderStaticText);
loadPlayer();

// ── Boucle de rendu ──────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.1);
    charRenderer.update(delta);
    buildMode.update(delta, keys);
    renderer.render(scene, camera);
}

// ── Redimensionnement ────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

// ── Lancement ────────────────────────────────────────────────────
// Entrer immédiatement en mode édition (toggle() = B)
buildMode.toggle();
animate();

// Masquer l'écran de chargement
const loadBar = document.getElementById('load-bar');
loadBar.style.width = '100%';
setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
    setTimeout(() => document.getElementById('loading').remove(), 600);
}, 400);
</script>

<script type="module" src="src/asset-check.js"></script>
<script type="module" src="src/nav.js"></script>
</body>
</html>
