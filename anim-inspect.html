<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Animation Inspector</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0f12; font-family:'Georgia', serif; color:#c8b89a; padding:30px; }
h1 { font-size:14px; letter-spacing:4px; text-transform:uppercase; color:#c8b89a; margin-bottom:20px; opacity:0.6; }
#list { display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; }
.clip {
    background:rgba(200,184,154,0.06); border:1px solid rgba(200,184,154,0.2);
    padding:8px 14px; font-size:11px; letter-spacing:1px; cursor:pointer;
    transition:all 0.15s;
}
.clip:hover  { background:rgba(200,184,154,0.14); border-color:#c8b89a; }
.clip.active { background:rgba(200,184,154,0.2);  border-color:#c8b89a; color:#fff; }
.clip .dur   { display:block; font-size:9px; opacity:0.4; margin-top:2px; }

#preview { margin-top:24px; }
canvas { border:1px solid rgba(200,184,154,0.1); }

#status { margin-bottom:12px; font-size:11px; letter-spacing:2px; opacity:0.5; }
#count  { font-size:11px; letter-spacing:2px; opacity:0.4; margin-bottom:12px; }
</style>
<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<h1>Universal Animation Library — Clips disponibles</h1>
<div style="display:flex;gap:8px;margin-bottom:16px">
    <button class="clip" id="btn-ual1" onclick="switchLib(1)">UAL 1</button>
    <button class="clip active" id="btn-ual2" onclick="switchLib(2)">UAL 2</button>
</div>
<div id="status">Chargement du GLB...</div>
<div id="count"></div>
<div id="list"></div>
<div id="preview"></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Mini scène 3D ────────────────────────────────────────────────
const W = Math.min(600, innerWidth - 60), H = 400;
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x111418);
const camera   = new THREE.PerspectiveCamera(50, W / H, 0.1, 50);
camera.position.set(0, 1.2, 3.5);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('preview').appendChild(renderer.domElement);

const ctrl = new OrbitControls(camera, renderer.domElement);
ctrl.target.set(0, 1, 0);
ctrl.enableDamping = true;
ctrl.update();

scene.add(new THREE.AmbientLight(0xffd8a0, 0.8));
const dir = new THREE.DirectionalLight(0xffffff, 2.5);
dir.position.set(3, 6, 4);
scene.add(dir);
const fillL = new THREE.DirectionalLight(0x8090b0, 0.6);
fillL.position.set(-3, 2, -3);
scene.add(fillL);

const floor = new THREE.Mesh(
    new THREE.CircleGeometry(4, 32),
    new THREE.MeshStandardMaterial({ color: 0x1a1612, roughness: 0.9 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// ── Chargement UAL ───────────────────────────────────────────────
let mixer = null, actions = {}, active = null, currentModel = null;

const LIBS = {
    1: 'Universal Animation Library[Standard]/Unreal-Godot/UAL1_Standard.glb',
    2: 'Universal Animation Library 2[Standard]/Unreal-Godot/UAL2_Standard.glb',
};

const loader = new GLTFLoader();

function loadLib(n) {
    document.getElementById('status').textContent = 'Chargement UAL' + n + '...';
    document.getElementById('list').innerHTML = '';
    document.getElementById('count').textContent = '';
    if (active) { active.stop(); active = null; }
    if (mixer)  { mixer.stopAllAction(); mixer = null; }
    if (currentModel) { scene.remove(currentModel); currentModel = null; }

    loader.load(LIBS[n], (gltf) => {
        const model = gltf.scene;
        model.position.set(0, 0, 0);
        const box = new THREE.Box3().setFromObject(model);
        const h   = box.max.y - box.min.y;
        model.scale.setScalar(1.75 / h);
        box.setFromObject(model);
        model.position.y = -box.min.y;
        scene.add(model);
        currentModel = model;
        mixer = new THREE.AnimationMixer(model);
        actions = {};

        const clips = [...gltf.animations].sort((a, b) => a.name.localeCompare(b.name));
        document.getElementById('status').textContent = 'UAL' + n + ' chargé ✓';
        document.getElementById('count').textContent  = clips.length + ' animations';

        const listEl = document.getElementById('list');
        for (const clip of clips) {
            const action = mixer.clipAction(clip);
            actions[clip.name] = action;
            const btn = document.createElement('div');
            btn.className = 'clip';
            btn.innerHTML = clip.name + '<span class="dur">' + clip.duration.toFixed(2) + 's</span>';
            btn.addEventListener('click', () => {
                if (active) active.fadeOut(0.2);
                action.reset().fadeIn(0.2).play();
                active = action;
                document.querySelectorAll('#list .clip').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
            listEl.appendChild(btn);
        }
        if (clips.length > 0) listEl.children[0].click();
    },
    (xhr) => {
        const pct = xhr.total ? Math.round(xhr.loaded / xhr.total * 100) : '...';
        document.getElementById('status').textContent = 'Chargement ' + pct + '%';
    },
    (err) => {
        document.getElementById('status').textContent = '⚠ Erreur : ' + err.message;
        console.error(err);
    });
}

window.switchLib = function(n) {
    document.getElementById('btn-ual1').classList.toggle('active', n === 1);
    document.getElementById('btn-ual2').classList.toggle('active', n === 2);
    loadLib(n);
};

loadLib(2); // UAL2 par défaut

const clock = new THREE.Clock();
(function animate() {
    requestAnimationFrame(animate);
    if (mixer) mixer.update(clock.getDelta());
    ctrl.update();
    renderer.render(scene, camera);
})();
</script>
<script src="src/nav.js"></script>
</body>
</html>
