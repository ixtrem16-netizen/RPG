<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animation Inspector</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0f12; font-family:'Georgia', serif; color:#c8b89a; padding:30px; }
h1 { font-size:14px; letter-spacing:4px; text-transform:uppercase; color:#c8b89a; margin-bottom:20px; opacity:0.6; }
#list { display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; }
.clip {
    background:rgba(200,184,154,0.06); border:1px solid rgba(200,184,154,0.2);
    padding:8px 14px; font-size:11px; letter-spacing:1px; cursor:pointer;
    transition:all 0.15s;
}
.clip:hover  { background:rgba(200,184,154,0.14); border-color:#c8b89a; }
.clip.active { background:rgba(200,184,154,0.2);  border-color:#c8b89a; color:#fff; }
.clip .dur   { display:block; font-size:9px; opacity:0.4; margin-top:2px; }

#preview { margin-top:24px; }
canvas { border:1px solid rgba(200,184,154,0.1); }

#status { margin-bottom:12px; font-size:11px; letter-spacing:2px; opacity:0.5; }
#count  { font-size:11px; letter-spacing:2px; opacity:0.4; margin-bottom:12px; }
</style>
<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<script type="module">
import { initI18n } from './src/i18n.js';
initI18n();
</script>
<h1>Animation Library — Clips disponibles</h1>
<div id="status">Chargement des animations...</div>
<div id="count"></div>
<div id="list"></div>
<div id="preview"></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Mini scène 3D ────────────────────────────────────────────────
const W = Math.min(600, innerWidth - 60), H = 400;
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x111418);
const camera   = new THREE.PerspectiveCamera(50, W / H, 0.1, 50);
camera.position.set(0, 1.2, 3.5);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('preview').appendChild(renderer.domElement);

const ctrl = new OrbitControls(camera, renderer.domElement);
ctrl.target.set(0, 1, 0);
ctrl.enableDamping = true;
ctrl.update();

scene.add(new THREE.AmbientLight(0xffd8a0, 0.8));
const dir = new THREE.DirectionalLight(0xffffff, 2.5);
dir.position.set(3, 6, 4);
scene.add(dir);
const fillL = new THREE.DirectionalLight(0x8090b0, 0.6);
fillL.position.set(-3, 2, -3);
scene.add(fillL);

const floor = new THREE.Mesh(
    new THREE.CircleGeometry(4, 32),
    new THREE.MeshStandardMaterial({ color: 0x1a1612, roughness: 0.9 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// ── Chargement animations (toutes libs fusionnées) ───────────────
let mixer = null, active = null, currentModel = null;

const ANIM_PATHS = [
    'assets/characters/animations/UAL1_Standard.glb',
    'assets/characters/animations/UAL1_Source.glb',
    'assets/characters/animations/UAL2_Standard.glb',
    'assets/characters/animations/UAL2_Source.glb',
];

const loader = new GLTFLoader();

async function loadAllAnims() {
    document.getElementById('status').textContent = 'Chargement des animations...';
    document.getElementById('list').innerHTML = '';
    document.getElementById('count').textContent = '';
    if (active) { active.stop(); active = null; }
    if (mixer)  { mixer.stopAllActions(); mixer = null; }
    if (currentModel) { scene.remove(currentModel); currentModel = null; }

    // Charger le modèle depuis le premier GLB disponible
    let baseGltf = null;
    for (const p of ANIM_PATHS) {
        try { baseGltf = await new Promise((res, rej) => loader.load(p, res, undefined, rej)); break; }
        catch {}
    }
    if (!baseGltf) { document.getElementById('status').textContent = '⚠ Aucun fichier animation trouvé.'; return; }

    const model = baseGltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const h = box.max.y - box.min.y;
    model.scale.setScalar(1.75 / h);
    box.setFromObject(model);
    model.position.y = -box.min.y;
    scene.add(model);
    currentModel = model;
    mixer = new THREE.AnimationMixer(model);

    // Fusionner tous les clips (priorité croissante : UAL1 Std → UAL1 Src → UAL2 Std → UAL2 Src)
    const clipMap = new Map();
    const results = await Promise.allSettled(
        ANIM_PATHS.map(p => new Promise((res, rej) => loader.load(p, res, undefined, rej)))
    );
    for (const r of results) {
        if (r.status === 'fulfilled') {
            for (const clip of r.value.animations) clipMap.set(clip.name, clip);
        }
    }
    const clips = [...clipMap.values()].sort((a, b) => a.name.localeCompare(b.name));

    document.getElementById('status').textContent = clips.length + ' animations chargées';
    document.getElementById('count').textContent  = '';

    const listEl = document.getElementById('list');
    for (const clip of clips) {
        const action = mixer.clipAction(clip);
        const btn = document.createElement('div');
        btn.className = 'clip';
        btn.innerHTML = clip.name + '<span class="dur">' + clip.duration.toFixed(2) + 's</span>';
        btn.addEventListener('click', () => {
            if (active) active.fadeOut(0.2);
            action.reset().fadeIn(0.2).play();
            active = action;
            document.querySelectorAll('#list .clip').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
        listEl.appendChild(btn);
    }
    if (clips.length > 0) listEl.children[0].click();
}

loadAllAnims();

const clock = new THREE.Clock();
(function animate() {
    requestAnimationFrame(animate);
    if (mixer) mixer.update(clock.getDelta());
    ctrl.update();
    renderer.render(scene, camera);
})();
</script>
<script type="module" src="src/asset-check.js"></script>
<script type="module" src="src/nav.js"></script>
</body>
</html>
