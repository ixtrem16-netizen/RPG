<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Char Preview — TGE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden;
    background:#0e1014; font-family:'Georgia', serif; color:#c8b89a;
    display:flex; }

/* ── Panneau gauche ─────────────────────────────────────────────── */
#left {
    width:200px; flex-shrink:0;
    background:rgba(6,4,2,0.97);
    border-right:1px solid rgba(200,184,154,0.12);
    display:flex; flex-direction:column; overflow:hidden;
}
#left-hdr {
    padding:14px 14px 10px;
    border-bottom:1px solid rgba(200,184,154,0.1);
    font-size:9px; letter-spacing:4px; text-transform:uppercase;
    color:rgba(200,184,154,0.35);
}
#char-list { flex:1; overflow-y:auto; }
.char-item {
    padding:9px 14px; font-size:11px; letter-spacing:0.05em;
    cursor:pointer; border-left:2px solid transparent;
    transition:background 0.1s, color 0.1s, border-color 0.1s;
    color:rgba(200,184,154,0.80);
    border-bottom:1px solid rgba(200,184,154,0.07);
}
.char-item:hover  { background:rgba(200,184,154,0.07); color:#d8c8a8; }
.char-item.active { background:rgba(200,184,154,0.1); color:#f0e0c0;
    border-left-color:rgba(200,184,154,0.5); }
.char-item.player { color:rgba(212,168,75,0.75); }
.char-item.player.active { color:#f0c040; border-left-color:#d4a84b; }
.char-badge {
    font-size:8px; letter-spacing:1px; color:rgba(200,184,154,0.28);
    margin-top:2px;
}
#no-configs {
    padding:20px 14px; font-size:10px; line-height:1.8;
    color:rgba(200,184,154,0.25); font-style:italic;
}

/* Boutons animation */
#anim-hdr {
    padding:6px 14px 5px;
    border-top:1px solid rgba(200,184,154,0.08);
    border-bottom:1px solid rgba(200,184,154,0.06);
    font-size:7.5px; letter-spacing:3px; text-transform:uppercase;
    color:rgba(200,184,154,0.22); flex-shrink:0;
}
#anim-btns { display:flex; flex-direction:column; flex-shrink:0; }
.anim-btn {
    padding:7px 14px; font-size:10px; letter-spacing:0.8px;
    cursor:pointer; border-left:2px solid transparent;
    transition:background 0.1s, color 0.1s;
    color:rgba(200,184,154,0.45);
    border-bottom:1px solid rgba(200,184,154,0.04);
}
.anim-btn:hover  { background:rgba(200,184,154,0.07); color:#d8c8a8; }
.anim-btn.active { background:rgba(200,184,154,0.1); color:#f0e0c0;
    border-left-color:rgba(200,184,154,0.4); }

/* ── Viewport ────────────────────────────────────────────────────── */
#vp { flex:1; position:relative; background:#0e1014; }
#vp canvas { display:block; width:100% !important; height:100% !important; }
#vp-status {
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    font-size:10px; letter-spacing:3px; text-transform:uppercase;
    color:rgba(200,184,154,0.45); pointer-events:none; text-align:center;
    white-space:nowrap;
}
#vp-loading {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:11px; letter-spacing:4px; text-transform:uppercase;
    color:rgba(200,184,154,0.35); display:none; pointer-events:none;
}
#vp-hint {
    position:absolute; bottom:12px; right:14px;
    font-size:8px; letter-spacing:1px; line-height:2;
    color:rgba(200,184,154,0.15); pointer-events:none; text-align:right;
}
</style>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="left">
    <div id="left-hdr">Personnages</div>
    <div id="char-list"></div>

    <div id="anim-hdr">Animation</div>
    <div id="anim-btns">
        <div class="anim-btn active" data-anim="idle">Idle</div>
        <div class="anim-btn" data-anim="walk">Marche</div>
        <div class="anim-btn" data-anim="run">Course</div>
        <div class="anim-btn" data-anim="combat">Combat</div>
        <div class="anim-btn" data-anim="jump">Saut</div>
    </div>
</div>

<div id="vp">
    <div id="vp-status">Selectionne un personnage</div>
    <div id="vp-loading">Chargement…</div>
    <div id="vp-hint">Clic droit + drag : orbiter<br>Molette : zoom</div>
</div>

<script type="module">
import * as THREE      from 'three';
import { GLTFLoader }  from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';
import { resolveCharConfig, getAllCharConfigs } from './src/char-config.js';
import { UAL_PATHS, CharacterRenderer, findIdleClip } from './src/char-loader.js';

// ── Scène ────────────────────────────────────────────────────────
const vp = document.getElementById('vp');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e1014);
scene.fog = new THREE.Fog(0x0e1014, 18, 40);

const camera = new THREE.PerspectiveCamera(50, vp.clientWidth / vp.clientHeight, 0.1, 100);
camera.position.set(0, 1.2, 3.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(vp.clientWidth, vp.clientHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
vp.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.minDistance = 1; controls.maxDistance = 8;
controls.update();

// Lumières
scene.add(new THREE.AmbientLight(0xffd8a0, 0.55));
const sun = new THREE.DirectionalLight(0xfff4e0, 3.0);
sun.position.set(3, 6, 4); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048); scene.add(sun);
const fillLight = new THREE.DirectionalLight(0x8090b0, 0.8);
fillLight.position.set(-3, 2, -3); scene.add(fillLight);
const backLight = new THREE.DirectionalLight(0xffaa44, 1.2);
backLight.position.set(0, 3, -5); scene.add(backLight);

// Sol
const floor = new THREE.Mesh(
    new THREE.CircleGeometry(6, 48),
    new THREE.MeshStandardMaterial({ color: 0x1a1510, roughness: 0.9 })
);
floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);
const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.9, 0.96, 64),
    new THREE.MeshBasicMaterial({ color: 0x3a2e1a, side: THREE.DoubleSide })
);
ring.rotation.x = -Math.PI / 2; ring.position.y = 0.001; scene.add(ring);

// ── Loader / cache ───────────────────────────────────────────────
const gltfLoader = new GLTFLoader();
const cache = {};
function loadGLTF(url) {
    if (cache[url]) return Promise.resolve(cache[url]);
    return new Promise((res, rej) => gltfLoader.load(url, g => { cache[url] = g; res(g); }, undefined, rej));
}

// ── Animations ───────────────────────────────────────────────────
const ANIM_PICK = {
    idle:   n => /idle_loop/i.test(n) || /\bidle\b/i.test(n),
    walk:   n => /walk_loop/i.test(n) || /\bwalk\b/i.test(n),
    run:    n => /run_loop/i.test(n)  || /\brun\b/i.test(n),
    combat: n => /idle.*combat|combat.*idle/i.test(n) || /sword.*idle|attack/i.test(n),
    jump:   n => /jump_loop|jump_idle|fall_idle/i.test(n) || /\bjump\b/i.test(n),
};

let allClips  = [];
let ualLoaded = false;

async function loadAnimations() {
    const results = await Promise.allSettled(UAL_PATHS.map(p => loadGLTF(p)));
    const clipMap = new Map();
    for (const r of results) {
        if (r.status === 'fulfilled')
            for (const c of r.value.animations) clipMap.set(c.name, c);
    }
    allClips  = [...clipMap.values()].sort((a, b) => a.name.localeCompare(b.name));
    ualLoaded = true;
}

// ── État ─────────────────────────────────────────────────────────
let charRenderer = null; // CharacterRenderer — dual-skeleton + shader zones
let currentAnim  = 'idle';

function playAnimKey(key) {
    if (!charRenderer || !allClips.length) return;
    currentAnim = key;
    const clip = key === 'idle'
        ? findIdleClip(allClips)
        : (allClips.find(ANIM_PICK[key]) || allClips[0]);
    if (!clip) return;
    charRenderer.play(clip);
    document.querySelectorAll('.anim-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.anim === key));
}

// ── Chargement personnage ─────────────────────────────────────────
async function loadChar(cfg) {
    document.getElementById('vp-loading').style.display = 'block';
    document.getElementById('vp-status').textContent = 'Chargement…';

    // CharacterRenderer — dual-skeleton + shader zones (identique char-builder)
    if (!charRenderer) charRenderer = new CharacterRenderer(scene, SkeletonUtils);

    try {
        await charRenderer.load(cfg, loadGLTF);
        if (!ualLoaded) await loadAnimations();
        playAnimKey(currentAnim);
        document.getElementById('vp-status').textContent = cfg.name || cfg.meshUrl.split('/').pop();
    } catch(e) {
        document.getElementById('vp-status').textContent = 'Erreur: ' + e.message;
        console.error('[CharPreview] loadChar error:', e);
    } finally {
        document.getElementById('vp-loading').style.display = 'none';
    }
}

// ── Construction de la liste ──────────────────────────────────────
function buildList() {
    const list = document.getElementById('char-list');
    list.innerHTML = '';

    console.log('[CharPreview] buildList() lancé');

    // 1. Personnage joueur sauvegardé
    const playerCfg = resolveCharConfig();
    console.log('[CharPreview] playerCfg:', playerCfg?.name, playerCfg?.meshUrl);
    if (playerCfg) {
        const el = document.createElement('div');
        el.className = 'char-item player';
        el.innerHTML = `<div>&#9733; Perso sauvegarde</div>
            <div class="char-badge">${playerCfg.name || playerCfg.meshUrl?.split('/').pop() || ''}</div>`;
        el.addEventListener('click', () => {
            document.querySelectorAll('.char-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            loadChar(playerCfg);
        });
        list.appendChild(el);
    }

    // 2. Configs nommées
    const named = getAllCharConfigs();
    if (named.length) {
        for (const c of named) {
            const cfg = resolveCharConfig(c.name);
            if (!cfg) continue;
            const el = document.createElement('div');
            el.className = 'char-item';
            el.innerHTML = `<div>${c.name}</div>
                <div class="char-badge">${cfg.meshUrl?.split('/').pop() || ''}</div>`;
            el.addEventListener('click', () => {
                document.querySelectorAll('.char-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
                loadChar(cfg);
            });
            list.appendChild(el);
        }
    }

    if (!playerCfg && !named.length) {
        list.innerHTML = '<div id="no-configs">Aucun personnage sauvegarde.<br>Utilise le Char Builder pour en creer un.</div>';
        return;
    }

    // Charger le premier automatiquement
    list.querySelector('.char-item')?.click();
}

// ── Boutons animation ─────────────────────────────────────────────
document.querySelectorAll('.anim-btn').forEach(btn => {
    btn.addEventListener('click', () => playAnimKey(btn.dataset.anim));
});

// ── Boucle ────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let _firstFrame = true;
(function animate() {
    requestAnimationFrame(animate);
    // Force resize au premier frame — corrige taille 0 si iframe caché à la création
    if (_firstFrame) {
        _firstFrame = false;
        const w = vp.clientWidth, h = vp.clientHeight;
        if (w > 0 && h > 0 && (renderer.domElement.width !== w * devicePixelRatio)) {
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        }
    }
    const delta = clock.getDelta();
    charRenderer?.update(Math.min(delta, 0.05));
    controls.update();
    renderer.render(scene, camera);
})();

new ResizeObserver(() => {
    const w = vp.clientWidth, h = vp.clientHeight;
    if (!w || !h) return;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
}).observe(vp);

// ── Init ──────────────────────────────────────────────────────────
buildList();
</script>

<script src="src/asset-check.js"></script>
<script src="src/nav.js"></script>
</body>
</html>
