<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Three.js Game Editor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100vh; overflow:hidden; background:#070503; font-family:'Georgia',serif; color:#c8b89a; }

/* ══ Barre d'onglets shell ══════════════════════════════════════ */
#shell-bar {
    display:flex; align-items:stretch;
    height:36px; flex-shrink:0;
    background:rgba(5,3,1,0.98);
    border-bottom:1px solid rgba(200,184,154,0.09);
    overflow:hidden; position:relative; z-index:10;
}
#shell-brand {
    display:flex; align-items:center;
    padding:0 16px;
    font-size:9px; letter-spacing:4px; text-transform:uppercase;
    color:rgba(200,184,154,0.5);
    border-right:1px solid rgba(200,184,154,0.07);
    white-space:nowrap; flex-shrink:0; cursor:pointer;
    transition:color 0.15s;
}
#shell-brand:hover { color:rgba(200,184,154,0.6); }
#shell-brand.active { color:rgba(200,184,154,0.55); }

#shell-tabs {
    display:flex; align-items:stretch;
    overflow-x:auto; flex:1;
    scrollbar-width:none;
}
#shell-tabs::-webkit-scrollbar { display:none; }

#shell-locale {
    display:flex; align-items:center; gap:4px;
    padding:0 10px;
    border-left:1px solid rgba(200,184,154,0.07);
    flex-shrink:0;
}
.shell-locale-btn {
    background:rgba(200,184,154,0.04);
    border:1px solid rgba(200,184,154,0.14);
    color:rgba(200,184,154,0.5);
    cursor:pointer;
    font-family:'Georgia',serif;
    font-size:8px;
    letter-spacing:1.6px;
    padding:4px 7px;
    text-transform:uppercase;
    transition:color 0.12s, border-color 0.12s, background 0.12s;
}
.shell-locale-btn:hover { color:rgba(200,184,154,0.85); border-color:rgba(200,184,154,0.35); }
.shell-locale-btn.active {
    color:#d4a84b;
    border-color:rgba(212,168,75,0.55);
    background:rgba(212,168,75,0.10);
}

.s-tab {
    display:flex; align-items:center; gap:6px;
    padding:0 14px; flex-shrink:0;
    font-size:9px; letter-spacing:1.5px; text-transform:uppercase;
    color:rgba(200,184,154,0.48); cursor:pointer;
    border-right:1px solid rgba(200,184,154,0.06);
    transition:color 0.12s, background 0.12s;
    position:relative; white-space:nowrap;
}
.s-tab:hover { color:rgba(200,184,154,0.82); background:rgba(200,184,154,0.05); }
.s-tab.active { color:#d8c8a8; background:rgba(200,184,154,0.09); }
.s-tab.active::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
    background:rgba(212,168,75,0.55);
}
.s-tab.primary { color:rgba(212,168,75,0.38); }
.s-tab.primary:hover { color:rgba(212,168,75,0.7); }
.s-tab.primary.active { color:#d4a84b; }
.s-tab.primary.active::after { background:rgba(212,168,75,0.75); }
.s-icon { font-size:10px; opacity:0.75; }

/* ══ Zone de contenu ════════════════════════════════════════════ */
#content { position:relative; width:100%; height:calc(100vh - 36px); }

/* Home screen */
#home {
    position:absolute; inset:0;
    overflow-y:auto; background:#070503;
    display:none; flex-direction:column; align-items:center;
    padding:44px 24px 64px;
}
#home.active { display:flex; }

/* Iframes */
.t-frame {
    position:absolute; inset:0;
    border:none; width:100%; height:100%;
    display:none; background:#070503;
}
.t-frame.active { display:block; }

/* ══ Hub home (reprise de l'ancien style) ═══════════════════════ */
.studio-label {
    font-size:9px; letter-spacing:6px; text-transform:uppercase;
    color:rgba(200,184,154,0.28); margin-bottom:14px;
}
.project-title {
    font-size:28px; letter-spacing:9px; text-transform:uppercase; color:#d0c0a0;
    margin-bottom:8px; text-shadow:0 0 40px rgba(200,168,100,0.12);
}
.ornament { font-size:10px; letter-spacing:12px; color:rgba(200,184,154,0.15); margin-bottom:44px; }

.hub-grid {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:10px; max-width:860px; width:100%;
}
.hub-section {
    grid-column:1/-1; font-size:8px; letter-spacing:5px; text-transform:uppercase;
    color:rgba(200,184,154,0.2); border-bottom:1px solid rgba(200,184,154,0.07);
    padding-bottom:7px; margin-top:18px;
}
.hub-section:first-of-type { margin-top:0; }

.hub-card {
    display:flex; flex-direction:column;
    background:rgba(11,9,5,0.9); border:1px solid rgba(200,184,154,0.10);
    padding:18px 18px 16px; cursor:pointer; position:relative;
    transition:border-color 0.18s, background 0.18s; overflow:hidden;
}
.hub-card::after {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent,rgba(200,184,154,0.12),transparent);
    transition:background 0.2s;
}
.hub-card:hover { border-color:rgba(200,184,154,0.28); background:rgba(18,14,8,0.95); }
.hub-card:hover::after { background:linear-gradient(90deg,transparent,rgba(200,184,154,0.22),transparent); }
.hub-card.primary { border-color:rgba(200,160,60,0.22); background:rgba(13,10,5,0.95); }
.hub-card.primary::after { background:linear-gradient(90deg,transparent,rgba(212,168,75,0.22),transparent); }
.hub-card.primary:hover { border-color:rgba(200,160,60,0.45); background:rgba(18,14,7,0.98); }
.hub-card.primary:hover::after { background:linear-gradient(90deg,transparent,rgba(212,168,75,0.32),transparent); }

.hub-icon { font-size:18px; opacity:0.55; margin-bottom:12px; line-height:1; }
.hub-card.primary .hub-icon { opacity:0.8; }
.hub-cat { font-size:8px; letter-spacing:3px; text-transform:uppercase; color:rgba(200,184,154,0.28); margin-bottom:4px; }
.hub-name { font-size:13px; letter-spacing:1.5px; color:#d8c8a8; margin-bottom:8px; }
.hub-card.primary .hub-name { color:#d4a84b; }
.hub-desc { font-size:11px; line-height:1.75; color:rgba(200,184,154,0.38); font-style:italic; flex:1; }
.hub-cta { margin-top:14px; font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(200,184,154,0.2); transition:color 0.15s; }
.hub-card:hover .hub-cta { color:rgba(200,184,154,0.55); }
.hub-card.primary .hub-cta { color:rgba(212,168,75,0.35); }
.hub-card.primary:hover .hub-cta { color:rgba(212,168,75,0.75); }
</style>
</head>
<body>

<!-- ══ Barre d'onglets ══════════════════════════════════════════ -->
<div id="shell-bar">
    <div id="shell-brand">TGE</div>
    <div id="shell-tabs"></div>
    <div id="shell-locale"></div>
</div>

<!-- ══ Contenu ══════════════════════════════════════════════════ -->
<div id="content">

    <!-- Hub -->
    <div id="home" class="active">
        <div class="studio-label" data-i18n="shell.home.studio-label">Quaternius Studio</div>
        <div class="project-title" data-i18n="app.title">Three.js Game Editor</div>
        <div class="ornament">✦ &nbsp;&nbsp; ✦ &nbsp;&nbsp; ✦</div>

        <div id="hub-grid" class="hub-grid"></div>
    </div>

    <!-- Iframes persistantes (lazy-loaded au premier accès) -->
    <div id="frame-host"></div>
</div>

<script type="module">
import { SUPPORTED_LOCALES, getLocale, initI18n, onLocaleChange, setLocale, t, translateDOM } from './src/i18n.js';
import { HOME_TOOL_ID, TOOL_DEFINITIONS, TOOL_SECTION_ORDER, getToolById, getToolsBySection } from './src/tool-metadata.js';

initI18n();

const shellBrand = document.getElementById('shell-brand');
const shellTabs = document.getElementById('shell-tabs');
const shellLocale = document.getElementById('shell-locale');
const hubGrid = document.getElementById('hub-grid');
const frameHost = document.getElementById('frame-host');
let _active = '';

function renderTab(tool) {
    const tab = document.createElement('div');
    tab.className = 's-tab' + (tool.primary ? ' primary' : '');
    tab.dataset.tool = tool.id;

    const icon = document.createElement('span');
    icon.className = 's-icon';
    icon.textContent = tool.icon;
    tab.appendChild(icon);
    tab.appendChild(document.createTextNode(t(tool.tabLabelKey)));
    return tab;
}

function renderCard(tool) {
    const card = document.createElement('div');
    card.className = 'hub-card' + (tool.primary ? ' primary' : '');
    card.dataset.open = tool.id;
    if (tool.homeColumnSpan) card.style.gridColumn = `span ${tool.homeColumnSpan}`;

    const icon = document.createElement('div');
    icon.className = 'hub-icon';
    icon.textContent = tool.icon;
    card.appendChild(icon);

    const cat = document.createElement('div');
    cat.className = 'hub-cat';
    cat.textContent = t(tool.badgeKey);
    card.appendChild(cat);

    const name = document.createElement('div');
    name.className = 'hub-name';
    name.textContent = t(tool.nameKey);
    card.appendChild(name);

    const desc = document.createElement('div');
    desc.className = 'hub-desc';
    desc.textContent = t(tool.descriptionKey);
    card.appendChild(desc);

    const cta = document.createElement('div');
    cta.className = 'hub-cta';
    cta.textContent = t('shell.home.cta');
    card.appendChild(cta);

    return card;
}

function renderLocaleSwitcher() {
    const currentLocale = getLocale();
    const buttons = SUPPORTED_LOCALES.map(locale => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'shell-locale-btn' + (locale === currentLocale ? ' active' : '');
        button.dataset.locale = locale;
        button.textContent = locale.toUpperCase();
        button.title = `${t('locale.label')}: ${t(`locale.names.${locale}`)}`;
        return button;
    });

    shellLocale.replaceChildren(...buttons);
}

function ensureFrames() {
    if (!frameHost.children.length) {
        for (const tool of TOOL_DEFINITIONS) {
            const frame = document.createElement('iframe');
            frame.className = 't-frame';
            frame.id = `frame-${tool.id}`;
            frameHost.appendChild(frame);
        }
    }

    for (const tool of TOOL_DEFINITIONS) {
        const frame = document.getElementById(`frame-${tool.id}`);
        if (frame) frame.title = t(tool.nameKey);
    }
}

function renderShell() {
    translateDOM();
    shellBrand.title = t('nav.home');
    shellTabs.replaceChildren(...TOOL_DEFINITIONS.map(renderTab));
    renderLocaleSwitcher();

    const hubNodes = [];
    for (const section of TOOL_SECTION_ORDER) {
        const title = document.createElement('div');
        title.className = 'hub-section';
        title.textContent = t(`shell.sections.${section}`);
        hubNodes.push(title);

        for (const tool of getToolsBySection(section)) {
            hubNodes.push(renderCard(tool));
        }
    }
    hubGrid.replaceChildren(...hubNodes);

    ensureFrames();
}

function switchTo(toolId) {
    document.querySelectorAll('.t-frame').forEach(frame => frame.classList.remove('active'));
    document.querySelectorAll('.s-tab').forEach(tab => tab.classList.remove('active'));
    document.getElementById('home').classList.remove('active');
    shellBrand.classList.remove('active');

    _active = toolId || '';

    if (!toolId) {
        document.getElementById('home').classList.add('active');
        shellBrand.classList.add('active');
        document.title = t('app.title');
        history.replaceState(null, '', location.pathname);
        return;
    }

    const tab = document.querySelector(`.s-tab[data-tool="${toolId}"]`);
    tab?.classList.add('active');

    const frame = document.getElementById(`frame-${toolId}`);
    if (frame && !frame._loaded) {
        frame.src = `${toolId}.html`;
        frame._loaded = true;
    }
    frame?.classList.add('active');

    const tool = getToolById(toolId);
    document.title = `${tool ? t(tool.nameKey) : toolId} - TGE`;
    history.replaceState(null, '', `#${toolId}`);
}

renderShell();

shellBrand.addEventListener('click', () => switchTo(HOME_TOOL_ID));
shellTabs.addEventListener('click', e => {
    const tab = e.target.closest('.s-tab');
    if (!tab) return;
    switchTo(tab.dataset.tool);
});
hubGrid.addEventListener('click', e => {
    const card = e.target.closest('.hub-card[data-open]');
    if (!card) return;
    switchTo(card.dataset.open);
});
shellLocale.addEventListener('click', e => {
    const button = e.target.closest('.shell-locale-btn');
    if (!button) return;
    setLocale(button.dataset.locale);
});

onLocaleChange(() => {
    const activeTool = _active;
    renderShell();
    switchTo(activeTool);
});

window.addEventListener('message', e => {
    if (e.data?.type === 'tge-navigate') {
        switchTo(e.data.to);
    }
});

const hash = location.hash.slice(1);
switchTo(hash || HOME_TOOL_ID);
</script>

<script type="module" src="src/asset-check.js"></script>
<script type="module" src="src/nav.js"></script>
</body>
</html>
