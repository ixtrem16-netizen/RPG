<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset Browser — Three.js Game Editor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0f12; font-family:'Georgia', serif; color:#c8b89a;
       display:flex; height:100vh; overflow:hidden; }

/* ══ Panneau inventaire ════════════════════════════════════════ */
#panel {
    width:272px; flex-shrink:0; background:#080a0c;
    border-right:1px solid rgba(200,184,154,0.08);
    display:flex; flex-direction:column; overflow:hidden;
    transition:width 0.2s ease, border-color 0.2s;
}
#panel.panel-closed { width:0; border-color:transparent; }

/* En-tête */
#panel-header {
    padding:10px 10px 0;
    flex-shrink:0;
}
#panel-title-row {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:8px;
}
#panel-title {
    font-size:8px; letter-spacing:4px; text-transform:uppercase;
    color:rgba(200,184,154,0.3);
}
#panel-close {
    background:none; border:none; color:rgba(200,184,154,0.28);
    font-size:14px; line-height:1; cursor:pointer; padding:0 2px;
    transition:color 0.12s; font-family:'Georgia',serif;
}
#panel-close:hover { color:rgba(200,184,154,0.75); }

/* Onglets catégorie */
#tabs {
    display:flex; gap:2px; flex-wrap:wrap;
    padding-bottom:8px;
    border-bottom:1px solid rgba(200,184,154,0.07);
}
.tab {
    padding:5px 8px; font-size:7.5px; letter-spacing:1px;
    text-transform:uppercase; cursor:pointer;
    background:rgba(200,184,154,0.04); border:1px solid rgba(200,184,154,0.1);
    color:rgba(200,184,154,0.38); transition:all 0.12s; white-space:nowrap;
}
.tab:hover  { background:rgba(200,184,154,0.09); color:rgba(200,184,154,0.7); }
.tab.active { background:rgba(200,184,154,0.13); color:#c8b89a;
              border-color:rgba(200,184,154,0.3); }

/* Recherche */
#search-wrap {
    position:relative; flex-shrink:0;
    border-bottom:1px solid rgba(200,184,154,0.07);
}
#search {
    width:100%; background:transparent; border:none;
    color:#c8b89a; padding:9px 32px 9px 12px;
    font-family:'Georgia',serif; font-size:10.5px; outline:none;
    letter-spacing:0.3px;
}
#search::placeholder { color:rgba(200,184,154,0.22); font-style:italic; }
#search:focus { background:rgba(200,184,154,0.04); }
#search-clear {
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:rgba(200,184,154,0.3);
    font-size:13px; cursor:pointer; display:none; line-height:1; padding:0;
}
#search-clear.visible { display:block; }
#search-clear:hover { color:rgba(200,184,154,0.75); }

/* ── Liste d'assets ── */
#item-list {
    flex:1; overflow-y:auto;
    scrollbar-width:thin; scrollbar-color:#2a2010 transparent;
}
#item-list::-webkit-scrollbar { width:4px; }
#item-list::-webkit-scrollbar-thumb { background:#2a2010; border-radius:2px; }

.list-subcat {
    padding:8px 12px 3px;
    font-size:7.5px; letter-spacing:3px; text-transform:uppercase;
    color:rgba(200,184,154,0.22);
    border-bottom:1px solid rgba(200,184,154,0.05);
    position:sticky; top:0; background:#080a0c; z-index:1;
}
.list-item {
    display:flex; align-items:center;
    padding:7px 14px; cursor:pointer;
    border-bottom:1px solid rgba(200,184,154,0.035);
    color:rgba(200,184,154,0.58); font-size:10.5px; letter-spacing:0.3px;
    transition:background 0.1s, color 0.1s, border-left 0.1s;
    border-left:2px solid transparent;
}
.list-item:hover { background:rgba(200,184,154,0.06); color:#d8c8a8; }
.list-item.active {
    background:rgba(212,168,75,0.08); color:#d4a84b;
    border-left-color:rgba(212,168,75,0.5);
}

#model-count {
    padding:5px 12px; font-size:8px; letter-spacing:2px;
    color:rgba(200,184,154,0.18);
    border-top:1px solid rgba(200,184,154,0.06);
    flex-shrink:0;
}

/* ── Panel animations ── */
#anim-panel {
    border-top:1px solid rgba(200,184,154,0.08);
    display:none; flex-direction:column; max-height:38%;
    flex-shrink:0;
}
#anim-header {
    padding:7px 12px; font-size:8px; letter-spacing:3px;
    text-transform:uppercase; color:rgba(200,184,154,0.28);
    flex-shrink:0;
}
#anim-search {
    background:rgba(200,184,154,0.04); border:none;
    border-bottom:1px solid rgba(200,184,154,0.08);
    color:#c8b89a; padding:7px 12px; font-family:'Georgia',serif;
    font-size:10px; outline:none; width:100%; flex-shrink:0;
}
#anim-search::placeholder { color:rgba(200,184,154,0.2); }
#clip-list {
    overflow-y:auto; flex:1;
    scrollbar-width:thin; scrollbar-color:#2a2418 transparent;
}
.clip-item {
    padding:6px 12px; font-size:9px; letter-spacing:0.3px;
    cursor:pointer; border-bottom:1px solid rgba(200,184,154,0.04);
    transition:background 0.1s; display:flex; justify-content:space-between;
    color:rgba(200,184,154,0.6);
}
.clip-item:hover  { background:rgba(200,184,154,0.07); color:#d8c8a8; }
.clip-item.active { background:rgba(200,184,154,0.13); color:#fff; }
.clip-item .dur   { font-size:9px; opacity:0.3; }

/* ══ Viewport ══════════════════════════════════════════════════ */
#viewport { flex:1; position:relative; background:#111418; }
#viewport canvas { display:block; width:100% !important; height:100% !important; }

/* Bouton réouverture */
#panel-open {
    position:absolute; top:10px; left:10px; z-index:10;
    background:rgba(8,6,4,0.85); border:1px solid rgba(200,184,154,0.2);
    color:rgba(200,184,154,0.5); font-size:13px; cursor:pointer;
    padding:5px 10px; display:none;
    transition:color 0.12s, border-color 0.12s;
}
#panel-open.visible { display:block; }
#panel-open:hover { color:#d8c8a8; border-color:rgba(200,184,154,0.45); }

#vp-label {
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    color:rgba(200,184,154,0.45); font-size:11px; letter-spacing:3px;
    text-transform:uppercase; pointer-events:none; text-align:center;
    line-height:1.8; white-space:pre; text-shadow:0 1px 4px rgba(0,0,0,0.8);
}
#vp-hint {
    position:absolute; bottom:14px; right:14px;
    color:rgba(200,184,154,0.15); font-size:9px; letter-spacing:1px;
    line-height:2; text-align:right; pointer-events:none;
}
#vp-loading {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:rgba(200,184,154,0.4); font-size:11px; letter-spacing:4px;
    text-transform:uppercase; display:none;
}
</style>

<div id="panel">
    <div id="panel-header">
        <div id="panel-title-row">

<script type="module">

// ═══════════════════════════════════════════════════════════════

function flattenCat(cat) {
    return Object.values(CATALOG[cat] || {}).flat();
}

// ═══════════════════════════════════════════════════════════════
//  SCÈNE 3D
// ═══════════════════════════════════════════════════════════════
const vp = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111418);
scene.fog = new THREE.FogExp2(0x111418, 0.04);

const camera = new THREE.PerspectiveCamera(50, vp.clientWidth / vp.clientHeight, 0.05, 200);
camera.position.set(0, 1.5, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(vp.clientWidth, vp.clientHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.localClippingEnabled = true;
vp.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 0.3;
controls.maxDistance = 80;
controls.update();

scene.add(new THREE.AmbientLight(0xffd8a0, 0.6));
const sun = new THREE.DirectionalLight(0xfff4d0, 2.5);
sun.position.set(5, 8, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 60;
sun.shadow.camera.left = -20; sun.shadow.camera.right = 20;
sun.shadow.camera.top  =  20; sun.shadow.camera.bottom = -20;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8090b0, 0.7);
fill.position.set(-4, 3, -4); scene.add(fill);
const rim = new THREE.DirectionalLight(0xffaa44, 0.9);
rim.position.set(0, 4, -6); scene.add(rim);

const floor = new THREE.Mesh(
    new THREE.CircleGeometry(30, 64),
    new THREE.MeshStandardMaterial({ color: 0x181410, roughness: 0.95 })
);
floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

const ring = new THREE.Mesh(
    new THREE.RingGeometry(1.2, 1.27, 72),
    new THREE.MeshBasicMaterial({ color: 0x3a2e1a, side: THREE.DoubleSide })
);
ring.rotation.x = -Math.PI / 2; ring.position.y = 0.002; scene.add(ring);

const grid = new THREE.GridHelper(20, 20, 0x201810, 0x1a140c);
grid.position.y = 0.001; scene.add(grid);

// ═══════════════════════════════════════════════════════════════
//  LOADER / CACHE
// ═══════════════════════════════════════════════════════════════
const gltfLoader = new GLTFLoader();
const _gltfCache = {};

function loadGLTF(url) {
    if (_gltfCache[url]) return Promise.resolve(_gltfCache[url]);
    return new Promise((res, rej) =>
        gltfLoader.load(url, g => { _gltfCache[url] = g; res(g); }, undefined, rej)
    );
}

// ═══════════════════════════════════════════════════════════════
//  ÉTAT SCÈNE
// ═══════════════════════════════════════════════════════════════
let currentMdl = null, mixer = null, activeAction = null;
let ualLoaded  = false;
let allClips   = [], animFilter = '';
let bodyClipPlane = null, headBone = null;
const headBoneWP  = new THREE.Vector3();

async function loadUAL() {
    if (ualLoaded) return;
    allClips = [];
    document.getElementById('clip-list').innerHTML =
        '<div style="padding:8px 14px;font-size:9px;opacity:.3;letter-spacing:2px">CHARGEMENT…</div>';
    const results = await Promise.allSettled(UAL_PATHS.map(p => loadGLTF(p)));
    const clipMap = new Map();
    for (const r of results) {
        if (r.status === 'fulfilled') {
            for (const clip of r.value.animations) clipMap.set(clip.name, clip);
        }
    }
    allClips  = [...clipMap.values()].sort((a, b) => a.name.localeCompare(b.name));
    ualLoaded = true;
    if (currentMdl?._animated) rebuildClips();
}

// ═══════════════════════════════════════════════════════════════
//  CORPS DE BASE (personnages)
// ═══════════════════════════════════════════════════════════════
const HEAD_MESHES = new Set(['Eyebrows', 'Eyes', 'SuperHero_Male', 'SuperHero_Female']);

function attachBody(baseGltf, outfitRoot) {
    bodyClipPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    headBone = null;
    const outfitBones = {};
    outfitRoot.traverse(n => { if (n.isBone) outfitBones[n.name] = n; });
    headBone = outfitBones['head'] || outfitBones['Head'] || null;

    const toAttach = [];
    baseGltf.scene.traverse(n => {
        if (n.isSkinnedMesh && HEAD_MESHES.has(n.name)) toAttach.push(n);
    });
    for (const node of toAttach) {
        const newBones = node.skeleton.bones.map(b => outfitBones[b.name]);
        if (newBones.some(b => !b)) continue;
        const newSkeleton = new THREE.Skeleton(newBones, node.skeleton.boneInverses);
        node.position.set(0,0,0); node.rotation.set(0,0,0); node.scale.set(1,1,1);
        node.bind(newSkeleton, new THREE.Matrix4());
        const isBody = node.name === 'SuperHero_Male' || node.name === 'SuperHero_Female';
        const clonedMats = (Array.isArray(node.material) ? node.material : [node.material])
            .map(m => m ? m.clone() : m);
        node.material = Array.isArray(node.material) ? clonedMats : clonedMats[0];
        for (const m of clonedMats) if (m) {
            m.side = THREE.DoubleSide;
            if (isBody) m.clippingPlanes = [bodyClipPlane];
        }
        node.castShadow = true; node.frustumCulled = false;
        outfitRoot.add(node);
    }
}

// ═══════════════════════════════════════════════════════════════
//  CHARGEMENT MODÈLE
// ═══════════════════════════════════════════════════════════════
function loadModel(item) {
    if (activeAction) { activeAction.stop(); activeAction = null; }
    if (mixer)        { mixer.stopAllActions(); mixer = null; }
    if (currentMdl)   { scene.remove(currentMdl._root); currentMdl = null; }
    bodyClipPlane = null; headBone = null;

    document.getElementById('vp-loading').style.display = 'block';
    document.getElementById('vp-label').textContent = item.name;

    const pOutfit = loadGLTF(item.src);
    const pBody   = item.bodyUrl ? loadGLTF(item.bodyUrl) : Promise.resolve(null);

    Promise.all([pOutfit, pBody]).then(([gltf, bodyGltf]) => {
        document.getElementById('vp-loading').style.display = 'none';

        const root = item.animated
            ? SkeletonUtils.clone(gltf.scene)
            : gltf.scene.clone(true);

        root.traverse(c => {
            if (!c.isMesh) return;
            c.castShadow = c.receiveShadow = true;
            c.frustumCulled = false;
            (Array.isArray(c.material) ? c.material : [c.material])
                .forEach(m => { if (m) m.side = THREE.DoubleSide; });
        });

        const box0 = new THREE.Box3().setFromObject(root);
        root.scale.setScalar(1.75 / (box0.max.y - box0.min.y || 1));
        if (bodyGltf) attachBody(bodyGltf, root);
        scene.add(root);

        const box  = new THREE.Box3().setFromObject(root);
        root.position.y -= box.min.y;
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const center = new THREE.Vector3(0, size.y * 0.5, 0);

        controls.target.copy(center);
        const dist = maxDim * 1.8;
        camera.position.set(dist * 0.6, center.y + dist * 0.3, dist);
        controls.minDistance = maxDim * 0.1;
        controls.maxDistance = maxDim * 12;
        controls.update();

        currentMdl = { _root: root, _animated: !!item.animated };
        document.getElementById('anim-panel').style.display =
            item.animated ? 'flex' : 'none';

        if (item.animated) {
            mixer = new THREE.AnimationMixer(root);
            if (ualLoaded) rebuildClips(); else loadUAL();
        }
    }).catch(err => {
        document.getElementById('vp-loading').style.display = 'none';
        document.getElementById('vp-label').textContent = '⚠ ' + err.message;
    });
}

// ── Clips animations ───────────────────────────────────────────
function rebuildClips() {
    if (!ualLoaded || !mixer) return;
    renderClipList();
    const idle = allClips.find(c => c.name.toLowerCase().includes('idle_loop'))
              || allClips.find(c => c.name.toLowerCase().includes('idle'))
              || allClips[0];
    if (idle) playClip(idle);
}

function renderClipList() {
    const term = animFilter.toLowerCase();
    const list = allClips.filter(c => !term || c.name.toLowerCase().includes(term));
    const el   = document.getElementById('clip-list');
    el.innerHTML = '';
    for (const clip of list) {
        const div = document.createElement('div');
        div.className = 'clip-item';
        div.innerHTML = `<span>${clip.name}</span><span class="dur">${clip.duration.toFixed(2)}s</span>`;
        div.addEventListener('click', () => {
            document.querySelectorAll('.clip-item').forEach(b => b.classList.remove('active'));
            div.classList.add('active');
            playClip(clip);
        });
        el.appendChild(div);
    }
}

function playClip(clip) {
    if (!mixer) return;
    if (activeAction) activeAction.fadeOut(0.2);
    const action = mixer.clipAction(clip);
    action.reset().fadeIn(0.2).play();
    activeAction = action;
}

// ═══════════════════════════════════════════════════════════════
//  UI — LISTE D'ASSETS
// ═══════════════════════════════════════════════════════════════
let currentCat  = 'Personnages';
let searchTerm  = '';
let selectedItem = null;

function renderList() {
    const subs    = CATALOG[currentCat] || {};
    const allItems = flattenCat(currentCat);
    const term     = searchTerm.toLowerCase();
    const el       = document.getElementById('item-list');
    el.innerHTML   = '';

    const makeRow = (item) => {
        const row = document.createElement('div');
        row.className = 'list-item' + (selectedItem === item ? ' active' : '');
        row.textContent = item.name;
        row.addEventListener('click', () => {
            document.querySelectorAll('.list-item').forEach(r => r.classList.remove('active'));
            row.classList.add('active');
            selectedItem = item;
            loadModel(item);
        });
        el.appendChild(row);
    };

    if (term) {
        const filtered = allItems.filter(i => i.name.toLowerCase().includes(term));
        filtered.forEach(makeRow);
        document.getElementById('model-count').textContent =
            filtered.length + ' / ' + allItems.length + ' assets';
    } else {
        for (const [subName, items] of Object.entries(subs)) {
            if (!items.length) continue;
            const hdr = document.createElement('div');
            hdr.className = 'list-subcat';
            hdr.textContent = subName;
            el.appendChild(hdr);
            items.forEach(makeRow);
        }
        document.getElementById('model-count').textContent = allItems.length + ' assets';
    }
}

// ── Onglets ────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCat = tab.dataset.cat;
        document.getElementById('search').value = '';
        document.getElementById('search-clear').classList.remove('visible');
        searchTerm = '';
        if (currentCat !== 'Personnages')
            document.getElementById('anim-panel').style.display = 'none';
        renderList();
    });
});

// ── Recherche ──────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
    searchTerm = e.target.value;
    document.getElementById('search-clear').classList.toggle('visible', searchTerm.length > 0);
    renderList();
});
document.getElementById('search-clear').addEventListener('click', () => {
    document.getElementById('search').value = '';
    document.getElementById('search-clear').classList.remove('visible');
    searchTerm = '';
    renderList();
    document.getElementById('search').focus();
});

// ── Animations ────────────────────────────────────────────────
document.getElementById('anim-search').addEventListener('input', e => {
    animFilter = e.target.value;
    renderClipList();
});

// ── Toggle panneau ────────────────────────────────────────────
document.getElementById('panel-close').addEventListener('click', () => {
    document.getElementById('panel').classList.add('panel-closed');
    document.getElementById('panel-open').classList.add('visible');
    // Resize renderer après la transition
    setTimeout(() => {
        renderer.setSize(vp.clientWidth, vp.clientHeight);
        camera.aspect = vp.clientWidth / vp.clientHeight;
        camera.updateProjectionMatrix();
    }, 220);
});
document.getElementById('panel-open').addEventListener('click', () => {
    document.getElementById('panel').classList.remove('panel-closed');
    document.getElementById('panel-open').classList.remove('visible');
    setTimeout(() => {
        renderer.setSize(vp.clientWidth, vp.clientHeight);
        camera.aspect = vp.clientWidth / vp.clientHeight;
        camera.updateProjectionMatrix();
    }, 220);
});

// ── Init ──────────────────────────────────────────────────────
renderList();

// ═══════════════════════════════════════════════════════════════
//  BOUCLE
// ═══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
(function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    if (mixer) mixer.update(delta);
    if (bodyClipPlane && headBone) {
        headBone.getWorldPosition(headBoneWP);
        bodyClipPlane.constant = -(headBoneWP.y - 0.22);
    }
    controls.update();
    renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
    camera.aspect = vp.clientWidth / vp.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(vp.clientWidth, vp.clientHeight);
});
</script>
