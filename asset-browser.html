<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Asset Browser — Three.js Game Editor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
    width:100%; height:100%; overflow:hidden;
    background:#0a0c0f; font-family:'Georgia', serif; color:#c8b89a;
    display:flex; flex-direction:row;
}

/* ══ Colonne gauche — liste/grille ═══════════════════════════════ */
#left-col {
    flex:1; min-width:0;
    display:flex; flex-direction:column;
    background:rgba(10,8,4,0.97);
    border-right:1px solid rgba(200,160,80,0.2);
    overflow:hidden;
}

/* En-tête */
#header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px;
    border-bottom:1px solid rgba(200,160,80,0.25);
    flex-shrink:0;
}
#header-title {
    font-size:clamp(11px,0.9vw,14px);
    font-weight:bold; letter-spacing:0.12em;
    color:#f0c040;
}
#header-hint {
    font-size:clamp(8px,0.65vw,10px);
    color:rgba(200,184,154,0.35); letter-spacing:0.05em;
}

/* Onglets catégorie */
#tabs {
    display:flex; flex-wrap:wrap; gap:4px;
    padding:8px 12px;
    border-bottom:1px solid rgba(200,160,80,0.15);
    flex-shrink:0;
}
.tab {
    padding:clamp(3px,0.4vh,6px) clamp(8px,0.8vw,14px);
    border-radius:4px;
    font-size:clamp(9px,0.75vw,11px);
    cursor:pointer;
    border:1px solid rgba(255,255,255,0.15);
    color:rgba(200,184,154,0.55);
    transition:background 0.12s, color 0.12s, border-color 0.12s;
    letter-spacing:0.04em;
}
.tab:hover  { background:rgba(200,184,154,0.08); color:#d8c8a8; }
.tab.active {
    background:rgba(212,168,75,0.18);
    border-color:rgba(212,168,75,0.55);
    color:#f0c040;
}

/* Recherche */
#search-wrap {
    position:relative; flex-shrink:0;
    border-bottom:1px solid rgba(200,160,80,0.12);
}
#search {
    width:100%; background:transparent; border:none;
    color:#c8b89a; padding:9px 34px 9px 14px;
    font-family:'Georgia',serif;
    font-size:clamp(9px,0.8vw,12px);
    outline:none; letter-spacing:0.3px;
}
#search::placeholder { color:rgba(200,184,154,0.22); font-style:italic; }
#search:focus { background:rgba(200,184,154,0.04); }
#search-clear {
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:rgba(200,184,154,0.3);
    font-size:14px; cursor:pointer; display:none; line-height:1; padding:0;
}
#search-clear.visible { display:block; }
#search-clear:hover { color:rgba(200,184,154,0.75); }

/* Grille de cards */
#item-grid {
    flex:1; overflow-y:auto;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(clamp(110px,10vw,180px), 1fr));
    gap:8px; padding:12px;
    align-content:start;
    scrollbar-width:thin; scrollbar-color:#2a2010 transparent;
}
#item-grid::-webkit-scrollbar { width:5px; }
#item-grid::-webkit-scrollbar-thumb { background:#2a2010; border-radius:3px; }

/* En-têtes de sous-catégorie (span full width dans la grille) */
.grid-subcat {
    grid-column:1 / -1;
    padding:6px 4px 3px;
    font-size:clamp(7px,0.65vw,9px); letter-spacing:3px; text-transform:uppercase;
    color:rgba(200,184,154,0.28);
    border-bottom:1px solid rgba(200,184,154,0.08);
    margin-top:4px;
}
.grid-subcat:first-child { margin-top:0; }

/* Cards */
.asset-card {
    background:rgba(35,25,15,0.9);
    border:2px solid rgba(200,160,80,0.12);
    border-radius:6px;
    cursor:pointer; text-align:center;
    overflow:hidden; display:flex; flex-direction:column;
    min-height:clamp(80px,11vh,140px);
    transition:border-color 0.12s, background 0.12s;
}
.asset-card:hover {
    border-color:rgba(200,160,80,0.5);
    background:rgba(65,45,12,0.9);
}
.asset-card.active {
    border-color:#d4a84b;
    background:rgba(80,55,10,0.95);
}
.card-bar { width:100%; height:4px; flex-shrink:0; }
.card-name {
    font-size:clamp(9px,0.8vw,12px);
    color:#e8d5a0; padding:7px 5px;
    line-height:1.4; flex:1;
    display:flex; align-items:center; justify-content:center;
    font-family:monospace;
}

/* Compteur bas de liste */
#item-count {
    padding:5px 14px; flex-shrink:0;
    font-size:clamp(7px,0.6vw,9px); letter-spacing:2px;
    color:rgba(200,184,154,0.2);
    border-top:1px solid rgba(200,160,80,0.1);
    font-family:monospace;
}

/* ══ Colonne droite — viewport + infos ════════════════════════════ */
#right-col {
    width:clamp(280px,28vw,480px);
    flex-shrink:0;
    display:flex; flex-direction:column;
    background:#111418;
    overflow:hidden;
}

/* Zone 3D */
#viewport {
    flex:1; position:relative; min-height:0;
    background:#111418;
}
#viewport canvas { display:block; width:100% !important; height:100% !important; }

#vp-label {
    position:absolute; top:12px; left:0; right:0;
    text-align:center;
    color:rgba(200,184,154,0.45); font-size:clamp(9px,0.75vw,11px);
    letter-spacing:3px; text-transform:uppercase;
    pointer-events:none; line-height:1.8;
    text-shadow:0 1px 4px rgba(0,0,0,0.9);
}
#vp-loading {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:rgba(200,184,154,0.4); font-size:11px; letter-spacing:4px;
    text-transform:uppercase; display:none;
}
#vp-hint {
    position:absolute; bottom:10px; left:0; right:0; text-align:center;
    color:rgba(200,184,154,0.13); font-size:8px; letter-spacing:1px;
    pointer-events:none;
}

/* Infos asset sélectionné */
#asset-info {
    flex-shrink:0;
    padding:10px 14px 8px;
    border-top:1px solid rgba(200,160,80,0.15);
    background:rgba(8,6,3,0.95);
}
#asset-name {
    font-size:clamp(11px,0.9vw,14px);
    font-weight:bold; color:#e8d5a0; letter-spacing:0.04em;
    margin-bottom:2px; font-family:monospace;
}
#asset-cat {
    font-size:clamp(8px,0.65vw,10px);
    color:rgba(200,184,154,0.35); letter-spacing:0.08em;
}

/* ── Panneau animations ──────────────────────────────────────────── */
#anim-panel {
    flex-shrink:0;
    border-top:1px solid rgba(200,184,154,0.08);
    display:none; flex-direction:column;
    max-height:38%;
    background:rgba(5,4,2,0.95);
}
#anim-header {
    padding:6px 12px; font-size:clamp(7px,0.6vw,9px);
    letter-spacing:3px; text-transform:uppercase;
    color:rgba(200,184,154,0.28); flex-shrink:0;
}
#anim-search {
    background:rgba(200,184,154,0.04); border:none;
    border-bottom:1px solid rgba(200,184,154,0.08);
    color:#c8b89a; padding:6px 12px;
    font-family:'Georgia',serif; font-size:clamp(9px,0.75vw,11px);
    outline:none; width:100%; flex-shrink:0;
}
#anim-search::placeholder { color:rgba(200,184,154,0.2); }
#clip-list {
    overflow-y:auto; flex:1;
    scrollbar-width:thin; scrollbar-color:#2a2418 transparent;
}
.clip-item {
    padding:5px 12px; font-size:clamp(8px,0.7vw,10px); letter-spacing:0.3px;
    cursor:pointer; border-bottom:1px solid rgba(200,184,154,0.04);
    transition:background 0.1s; display:flex; justify-content:space-between;
    color:rgba(200,184,154,0.6);
}
.clip-item:hover  { background:rgba(200,184,154,0.07); color:#d8c8a8; }
.clip-item.active { background:rgba(200,184,154,0.13); color:#fff; }
.clip-item .dur   { font-size:8px; opacity:0.3; }
</style>

  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",

<!-- ══ Colonne gauche ═══════════════════════════════════════════ -->
<div id="left-col">

        <div class="tab" data-cat="Village">Village</div>
        <div class="tab" data-cat="Props">Props</div>
    </div>
    <div id="search-wrap">
        <input id="search" type="text" placeholder="Rechercher un asset…" autocomplete="off">
        <button id="search-clear" title="Effacer">✕</button>
    </div>
    <div id="item-grid"></div>
    <div id="item-count">—</div>
</div>

<!-- ══ Colonne droite ═══════════════════════════════════════════ -->
<div id="right-col">
    <div id="viewport">
        <div id="vp-label">Sélectionne un asset</div>
        <div id="vp-loading">Chargement…</div>

    </div>
    <div id="asset-info">
        <div id="asset-name">—</div>
        <div id="asset-cat"></div>
    </div>
    <div id="anim-panel">
        <div id="anim-header">Animations</div>
        <input id="anim-search" type="text" placeholder="Filtrer clips…">
        <div id="clip-list"></div>
    </div>
</div>

            'Crate_Wooden','Crate_Metal','Pouch_Large',
            'FarmCrate_Apple','FarmCrate_Carrot','FarmCrate_Empty',
        ].map(n => ({ name:n, src: BASE_PROPS+n+'.gltf' })),
        'Nourriture & Potions': [
            'Cauldron','Chalice','Mug','Pot_1','Potion_1','Potion_2','Potion_4',
        ].map(n => ({ name:n, src: BASE_PROPS+n+'.gltf' })),
        'Commerce': [
            'Stall_Empty','Stall_Cart_Empty','Coin_Pile','Coin_Pile_2','Key_Gold','Key_Metal',
        ].map(n => ({ name:n, src: BASE_PROPS+n+'.gltf' })),
        'Décoration': [
            'Banner_1','Banner_2','Cage_Small','Rope_1','Scroll_1','Scroll_2','Vase_2','Vase_4',
        ].map(n => ({ name:n, src: BASE_PROPS+n+'.gltf' })),
    },
};

function flattenCat(cat) {
    return Object.values(CATALOG[cat] || {}).flat();
}

// ═══════════════════════════════════════════════════════════════
//  SCÈNE 3D
// ═══════════════════════════════════════════════════════════════
const vp = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111418);
scene.fog = new THREE.FogExp2(0x111418, 0.04);

const camera = new THREE.PerspectiveCamera(50, vp.clientWidth / vp.clientHeight, 0.05, 200);
camera.position.set(0, 1.5, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(vp.clientWidth, vp.clientHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.localClippingEnabled = true;
vp.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 0.3;
controls.maxDistance = 80;
controls.update();

scene.add(new THREE.AmbientLight(0xffd8a0, 0.6));
const sun = new THREE.DirectionalLight(0xfff4d0, 2.5);
sun.position.set(5, 8, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 60;
sun.shadow.camera.left = -20; sun.shadow.camera.right = 20;
sun.shadow.camera.top  =  20; sun.shadow.camera.bottom = -20;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8090b0, 0.7);
fill.position.set(-4, 3, -4); scene.add(fill);
const rim = new THREE.DirectionalLight(0xffaa44, 0.9);
rim.position.set(0, 4, -6); scene.add(rim);

const floor = new THREE.Mesh(
    new THREE.CircleGeometry(30, 64),
    new THREE.MeshStandardMaterial({ color: 0x181410, roughness: 0.95 })
);
floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

const ring = new THREE.Mesh(
    new THREE.RingGeometry(1.2, 1.27, 72),
    new THREE.MeshBasicMaterial({ color: 0x3a2e1a, side: THREE.DoubleSide })
);
ring.rotation.x = -Math.PI / 2; ring.position.y = 0.002; scene.add(ring);

const gridHelper = new THREE.GridHelper(20, 20, 0x201810, 0x1a140c);
gridHelper.position.y = 0.001; scene.add(gridHelper);

// ═══════════════════════════════════════════════════════════════
//  LOADER / CACHE
// ═══════════════════════════════════════════════════════════════
const gltfLoader = new GLTFLoader();
const _gltfCache = {};

function loadGLTF(url) {
    if (_gltfCache[url]) return Promise.resolve(_gltfCache[url]);
    return new Promise((res, rej) =>
        gltfLoader.load(url, g => { _gltfCache[url] = g; res(g); }, undefined, rej)
    );
}

// ═══════════════════════════════════════════════════════════════
//  ÉTAT SCÈNE
// ═══════════════════════════════════════════════════════════════
let currentMdl = null, mixer = null, activeAction = null;
let ualLoaded  = false;
let allClips   = [], animFilter = '';
let bodyClipPlane = null, headBone = null;
const headBoneWP  = new THREE.Vector3();

async function loadUAL() {
    if (ualLoaded) return;
    allClips = [];
    document.getElementById('clip-list').innerHTML =
        '<div style="padding:8px 14px;font-size:9px;opacity:.3;letter-spacing:2px">CHARGEMENT…</div>';
    const results = await Promise.allSettled(UAL_PATHS.map(p => loadGLTF(p)));
    const clipMap = new Map();
    for (const r of results) {
        if (r.status === 'fulfilled') {
            for (const clip of r.value.animations) clipMap.set(clip.name, clip);
        }
    }
    allClips  = [...clipMap.values()].sort((a, b) => a.name.localeCompare(b.name));
    ualLoaded = true;
    if (currentMdl?._animated) rebuildClips();
}

// ═══════════════════════════════════════════════════════════════
//  CORPS DE BASE (personnages)
// ═══════════════════════════════════════════════════════════════
const HEAD_MESHES = new Set(['Eyebrows', 'Eyes', 'SuperHero_Male', 'SuperHero_Female']);

function attachBody(baseGltf, outfitRoot) {
    bodyClipPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    headBone = null;
    const outfitBones = {};
    outfitRoot.traverse(n => { if (n.isBone) outfitBones[n.name] = n; });
    headBone = outfitBones['head'] || outfitBones['Head'] || null;

    // Os de repli : utilisé pour les os du body-skin absents de l'outfit
    const fallbackBone = outfitBones['Hips'] || outfitBones['Root']
        || Object.values(outfitBones)[0] || null;
    if (!fallbackBone) return;  // rig incompatible — abandon sécurisé

    const toAttach = [];
    baseGltf.scene.traverse(n => {
        if (n.isSkinnedMesh && HEAD_MESHES.has(n.name)) toAttach.push(n);
    });
    for (const node of toAttach) {
        // Les os manquants sont remplacés par fallbackBone plutôt qu'abandonner le mesh
        const newBones = node.skeleton.bones.map(b => outfitBones[b.name] || fallbackBone);
        if (!newBones.length) continue;
        const newSkeleton = new THREE.Skeleton(newBones, node.skeleton.boneInverses);
        node.position.set(0,0,0); node.rotation.set(0,0,0); node.scale.set(1,1,1);
        node.bind(newSkeleton, new THREE.Matrix4());
        const isBody = node.name === 'SuperHero_Male' || node.name === 'SuperHero_Female';
        const clonedMats = (Array.isArray(node.material) ? node.material : [node.material])
            .map(m => m ? m.clone() : m);
        node.material = Array.isArray(node.material) ? clonedMats : clonedMats[0];
        for (const m of clonedMats) if (m) {
            m.side = THREE.DoubleSide;
            if (isBody) m.clippingPlanes = [bodyClipPlane];
        }
        node.castShadow = true; node.frustumCulled = false;
        outfitRoot.add(node);
    }
}

// ═══════════════════════════════════════════════════════════════
//  CHARGEMENT MODÈLE
// ═══════════════════════════════════════════════════════════════
let _loadSeq = 0;  // guard race-condition : chaque appel a son propre id

function loadModel(item, catName) {
    const mySeq = ++_loadSeq;

    if (activeAction) { activeAction.stop(); activeAction = null; }
    if (mixer)        { mixer.stopAllActions(); mixer = null; }
    if (currentMdl)   { scene.remove(currentMdl._root); currentMdl = null; }
    bodyClipPlane = null; headBone = null;

    document.getElementById('vp-loading').style.display = 'block';
    document.getElementById('vp-label').textContent = item.name;
    document.getElementById('asset-name').textContent = item.name;
    document.getElementById('asset-cat').textContent  = catName || '';

    const pOutfit = loadGLTF(item.src);
    const pBody   = item.bodyUrl ? loadGLTF(item.bodyUrl) : Promise.resolve(null);

    Promise.all([pOutfit, pBody]).then(([gltf, bodyGltf]) => {
        // Un appel plus récent a déjà pris le relais — on abandonne silencieusement.
        if (mySeq !== _loadSeq) return;
        document.getElementById('vp-loading').style.display = 'none';

        const root = item.animated
            ? SkeletonUtils.clone(gltf.scene)
            : gltf.scene.clone(true);

        root.traverse(c => {
            if (!c.isMesh) return;
            c.castShadow = c.receiveShadow = true;
            c.frustumCulled = false;
            (Array.isArray(c.material) ? c.material : [c.material])
                .forEach(m => { if (m) m.side = THREE.DoubleSide; });
        });

        // Attacher le corps d'abord (tête incluse dans le bbox) → échelle cohérente
        if (bodyGltf) attachBody(bodyGltf, root);
        scene.add(root);

        const box0 = new THREE.Box3().setFromObject(root);
        root.scale.setScalar(1.75 / (box0.max.y - box0.min.y || 1));

        const box  = new THREE.Box3().setFromObject(root);
        root.position.y -= box.min.y;
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const center = new THREE.Vector3(0, size.y * 0.5, 0);

        controls.target.copy(center);
        const dist = maxDim * 1.8;
        camera.position.set(dist * 0.6, center.y + dist * 0.3, dist);
        controls.minDistance = maxDim * 0.1;
        controls.maxDistance = maxDim * 12;
        controls.update();

        currentMdl = { _root: root, _animated: !!item.animated };
        document.getElementById('anim-panel').style.display =
            item.animated ? 'flex' : 'none';

        if (item.animated) {
            mixer = new THREE.AnimationMixer(root);
            if (ualLoaded) rebuildClips(); else loadUAL();
        }
    }).catch(err => {
        document.getElementById('vp-loading').style.display = 'none';
        document.getElementById('vp-label').textContent = '⚠ ' + err.message;
    });
}

// ── Clips animations ───────────────────────────────────────────
function rebuildClips() {
    if (!ualLoaded || !mixer) return;
    renderClipList();
    const idle = allClips.find(c => c.name.toLowerCase().includes('idle_loop'))
              || allClips.find(c => c.name.toLowerCase().includes('idle'))
              || allClips[0];
    if (idle) playClip(idle);
}

function renderClipList() {
    const term = animFilter.toLowerCase();
    const list = allClips.filter(c => !term || c.name.toLowerCase().includes(term));
    const el   = document.getElementById('clip-list');
    el.innerHTML = '';
    for (const clip of list) {
        const div = document.createElement('div');
        div.className = 'clip-item';
        div.innerHTML = `<span>${clip.name}</span><span class="dur">${clip.duration.toFixed(2)}s</span>`;
        div.addEventListener('click', () => {
            document.querySelectorAll('.clip-item').forEach(b => b.classList.remove('active'));
            div.classList.add('active');
            playClip(clip);
        });
        el.appendChild(div);
    }
}

function playClip(clip) {
    if (!mixer) return;
    if (activeAction) activeAction.fadeOut(0.2);
    const action = mixer.clipAction(clip);
    action.reset().fadeIn(0.2).play();
    activeAction = action;
}

// ═══════════════════════════════════════════════════════════════
//  UI — GRILLE DE CARDS
// ═══════════════════════════════════════════════════════════════
let currentCat  = 'Personnages';
let searchTerm  = '';
let selectedCard = null;  // élément DOM actif

function renderGrid() {
    const subs     = CATALOG[currentCat] || {};
    const allItems = flattenCat(currentCat);
    const term     = searchTerm.toLowerCase();
    const color    = CAT_COLOR[currentCat] || '#888';
    const grid     = document.getElementById('item-grid');
    grid.innerHTML = '';

    const makeCard = (item, subLabel) => {
        const card = document.createElement('div');
        card.className = 'asset-card';

        const bar = document.createElement('div');
        bar.className = 'card-bar';
        bar.style.background = color;
        card.appendChild(bar);

        const name = document.createElement('div');
        name.className = 'card-name';
        name.textContent = item.name;
        card.appendChild(name);

        card.addEventListener('click', () => {
            if (selectedCard) selectedCard.classList.remove('active');
            card.classList.add('active');
            selectedCard = card;
            loadModel(item, subLabel || currentCat);
        });

        grid.appendChild(card);
        return card;
    };

    if (term) {
        const filtered = allItems.filter(i => i.name.toLowerCase().includes(term));
        filtered.forEach(item => makeCard(item, currentCat));
        document.getElementById('item-count').textContent =
            filtered.length + ' / ' + allItems.length + ' assets';
    } else {
        for (const [subName, items] of Object.entries(subs)) {
            if (!items.length) continue;
            const hdr = document.createElement('div');
            hdr.className = 'grid-subcat';
            hdr.textContent = subName;
            grid.appendChild(hdr);
            items.forEach(item => makeCard(item, subName));
        }
        document.getElementById('item-count').textContent = allItems.length + ' assets';
    }

    // Auto-sélectionner le premier item
    const firstCard = grid.querySelector('.asset-card');
    if (firstCard) firstCard.click();
}

// ── Onglets ────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCat = tab.dataset.cat;
        document.getElementById('search').value = '';
        document.getElementById('search-clear').classList.remove('visible');
        searchTerm = '';
        selectedCard = null;
        if (currentCat !== 'Personnages')
            document.getElementById('anim-panel').style.display = 'none';
        renderGrid();
    });
});

// ── Recherche ──────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
    searchTerm = e.target.value;
    document.getElementById('search-clear').classList.toggle('visible', searchTerm.length > 0);
    selectedCard = null;
    renderGrid();
});
document.getElementById('search-clear').addEventListener('click', () => {
    document.getElementById('search').value = '';
    document.getElementById('search-clear').classList.remove('visible');
    searchTerm = '';
    selectedCard = null;
    renderGrid();
    document.getElementById('search').focus();
});

// ── Animations ─────────────────────────────────────────────────
document.getElementById('anim-search').addEventListener('input', e => {
    animFilter = e.target.value;
    renderClipList();
});

// ── Init ──────────────────────────────────────────────────────
renderGrid();

// ═══════════════════════════════════════════════════════════════
//  BOUCLE
// ═══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
(function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    if (mixer) mixer.update(delta);
    if (bodyClipPlane && headBone) {
        headBone.getWorldPosition(headBoneWP);
        bodyClipPlane.constant = -(headBoneWP.y - 0.22);
    }
    controls.update();
    renderer.render(scene, camera);
})();

// ── Resize ────────────────────────────────────────────────────
const resizeObs = new ResizeObserver(() => {
    const w = vp.clientWidth, h = vp.clientHeight;
    if (!w || !h) return;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});
resizeObs.observe(vp);
</script>
<script src="src/asset-check.js"></script>
<script src="src/nav.js"></script>
